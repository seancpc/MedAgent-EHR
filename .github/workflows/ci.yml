name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages (editable, with dev extras)
        run: |
          pip install -e "./fhir-mcp-server[dev]"
          pip install -e "./medagent-ehr[dev]"

      - name: Run tests
        run: pytest fhir-mcp-server/tests medagent-ehr/tests -q
